<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栖心情绪小筑 - 情绪陪伴应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(180deg, #fff5f0 0%, #ffe4d6 100%);
        }

        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(90deg, #ff9a76 0%, #ffb088 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 154, 118, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        /* 页面切换 */
        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ========== 首页样式 ========== */
        .home-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 60vh;
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff9a76 0%, #ffb088 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255, 154, 118, 0.3);
        }

        .home-page h2 {
            font-size: 28px;
            color: #ff6b47;
            margin-bottom: 15px;
        }

        .home-page p {
            color: #666;
            font-size: 14px;
            line-height: 1.8;
            max-width: 300px;
            margin-bottom: 30px;
        }

        .feature-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 350px;
        }

        .feature-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 12px rgba(255, 154, 118, 0.15);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 154, 118, 0.25);
        }

        .feature-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .feature-card .name {
            font-size: 14px;
            color: #ff6b47;
            font-weight: 600;
        }

        /* ========== 心声对话屋 ========== */
        .dialog-page {
            max-width: 500px;
            margin: 0 auto;
        }

        .dialog-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(255, 154, 118, 0.15);
        }

        .dialog-section h3 {
            color: #ff6b47;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .voice-input-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .voice-btn {
            background: linear-gradient(90deg, #ff9a76 0%, #ffb088 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(255, 154, 118, 0.3);
        }

        .voice-btn:active {
            transform: scale(0.98);
        }

        .voice-btn:hover {
            box-shadow: 0 6px 16px rgba(255, 154, 118, 0.4);
        }

        .voice-btn.listening {
            background: linear-gradient(90deg, #ff6b47 0%, #ff8a65 100%);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 12px rgba(255, 154, 118, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(255, 154, 118, 0.6); }
        }

        .transcript-box {
            background: #fef5f1;
            border-left: 4px solid #ff9a76;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            min-height: 50px;
            max-height: 150px;
            overflow-y: auto;
        }

        .ai-response {
            background: #f0f8ff;
            border-left: 4px solid #4da6ff;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-top: 15px;
        }

        .emotion-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .emotion-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .emotion-btn.active {
            border-color: #ff9a76;
            background: #fff5f0;
            color: #ff6b47;
            font-weight: 600;
        }

        /* ========== 趣味释压坊 ========== */
        .relief-page {
            max-width: 500px;
            margin: 0 auto;
        }

        .relief-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .relief-tab {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-align: center;
        }

        .relief-tab.active {
            border-color: #ff9a76;
            background: linear-gradient(90deg, #ff9a76 0%, #ffb088 100%);
            color: white;
            font-weight: 600;
        }

        .relief-content {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 12px rgba(255, 154, 118, 0.15);
        }

        .relief-content.active {
            display: block;
        }

        /* 沙袋 */
        .punching-bag {
            width: 150px;
            height: 200px;
            margin: 30px auto;
            background: linear-gradient(135deg, #ff9a76 0%, #ffb088 100%);
            border-radius: 75px 75px 40px 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            transition: transform 0.1s;
            box-shadow: 0 8px 20px rgba(255, 154, 118, 0.3);
            position: relative;
        }

        .punching-bag:active {
            transform: scaleY(0.95) scaleX(1.05);
        }

        .bag-count {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 20px;
        }

        /* 绘画板 */
        .canvas-container {
            text-align: center;
            margin-bottom: 20px;
        }

        #drawingCanvas {
            border: 2px solid #ff9a76;
            border-radius: 10px;
            cursor: crosshair;
            background: white;
            display: block;
            margin: 0 auto 15px;
            max-width: 100%;
        }

        .canvas-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .canvas-tool-btn {
            padding: 10px 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .canvas-tool-btn.active {
            border-color: #ff9a76;
            background: #fff5f0;
            color: #ff6b47;
            font-weight: 600;
        }

        .canvas-tool-btn:hover {
            border-color: #ff9a76;
        }

        .color-picker {
            width: 50px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 音乐播放 */
        .music-player {
            text-align: center;
        }

        .music-display {
            background: linear-gradient(135deg, #ff9a76 0%, #ffb088 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .music-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .music-artist {
            font-size: 13px;
            opacity: 0.9;
        }

        .music-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .music-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 12px rgba(255, 154, 118, 0.2);
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(255, 154, 118, 0.3);
        }

        .music-btn:active {
            transform: scale(0.95);
        }

        .music-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .music-item {
            padding: 12px;
            background: #f9f9f9;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .music-item:hover {
            background: #fff5f0;
            border-left-color: #ff9a76;
        }

        .music-item.playing {
            background: linear-gradient(90deg, #fff5f0 0%, #ffe4d6 100%);
            border-left-color: #ff9a76;
            font-weight: 600;
            color: #ff6b47;
        }

        /* ========== 心绪答疑册 ========== */
        .faq-page {
            max-width: 500px;
            margin: 0 auto;
        }

        .faq-categories {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .category-btn {
            flex-shrink: 0;
            padding: 10px 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .category-btn.active {
            border-color: #ff9a76;
            background: linear-gradient(90deg, #ff9a76 0%, #ffb088 100%);
            color: white;
            font-weight: 600;
        }

        .faq-item {
            background: white;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(255, 154, 118, 0.15);
        }

        .faq-question {
            padding: 15px;
            background: linear-gradient(90deg, #fff5f0 0%, #ffe4d6 100%);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .faq-question:hover {
            background: linear-gradient(90deg, #ffe4d6 0%, #ffccaa 100%);
        }

        .faq-question-text {
            font-weight: 600;
            color: #ff6b47;
            font-size: 14px;
        }

        .faq-toggle {
            color: #ff9a76;
            font-weight: bold;
        }

        .faq-answer {
            display: none;
            padding: 15px;
            color: #666;
            font-size: 13px;
            line-height: 1.8;
            border-top: 1px solid #f0e6e0;
        }

        .faq-answer.show {
            display: block;
        }

        /* ========== 底部导航栏 ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: white;
            border-top: 2px solid #f0e6e0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
            font-size: 13px;
            flex: 1;
            height: 100%;
            justify-content: center;
        }

        .nav-item.active {
            color: #ff6b47;
        }

        .nav-item .icon {
            font-size: 24px;
        }

        .nav-item .label {
            font-size: 11px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 20px;
            }

            .feature-cards {
                max-width: 100%;
            }

            #drawingCanvas {
                max-width: 100%;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff9a76;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff6b47;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部头部 -->
        <div class="header">
            <h1>🌸 栖心情绪小筑</h1>
            <p>每一刻情绪，都值得被温柔对待</p>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <!-- 首页 -->
            <div class="page home-page active">
                <div class="app-icon">🌺</div>
                <h2>欢迎来到栖心小筑</h2>
                <p>一个为你的心灵而设的温暖角落<br>倾诉、解压、成长，我们一起陪伴你</p>
                <div class="feature-cards">
                    <div class="feature-card" onclick="navigateTo(1)">
                        <div class="icon">💬</div>
                        <div class="name">心声对话屋</div>
                    </div>
                    <div class="feature-card" onclick="navigateTo(2)">
                        <div class="icon">🎮</div>
                        <div class="name">趣味释压坊</div>
                    </div>
                    <div class="feature-card" onclick="navigateTo(3)">
                        <div class="icon">📚</div>
                        <div class="name">心绪答疑册</div>
                    </div>
                    <div class="feature-card" onclick="navigateTo(0)">
                        <div class="icon">🏠</div>
                        <div class="name">返回首页</div>
                    </div>
                </div>
            </div>

            <!-- 心声对话屋 -->
            <div class="page dialog-page">
                <div class="dialog-section">
                    <h3>🎯 选择你当前的情绪</h3>
                    <div class="emotion-selector">
                        <button class="emotion-btn" onclick="selectEmotion('sad')">😢 沮丧</button>
                        <button class="emotion-btn" onclick="selectEmotion('anxious')">😰 焦虑</button>
                        <button class="emotion-btn" onclick="selectEmotion('tired')">😩 疲惫</button>
                        <button class="emotion-btn" onclick="selectEmotion('angry')">😠 愤怒</button>
                    </div>
                </div>

                <div class="dialog-section">
                    <h3>🎤 说出你的心声</h3>
                    <div class="voice-input-box">
                        <button class="voice-btn" id="voiceBtn" onclick="startVoiceInput()">
                            🎙️ 点击开始语音输入
                        </button>
                        <div class="transcript-box" id="transcript">
                            点击按钮后开始说话...
                        </div>
                    </div>
                </div>

                <div class="dialog-section">
                    <h3>💚 AI 贴心回复</h3>
                    <div class="ai-response" id="aiResponse">
                        等待你的倾诉...选择情绪并开始说话，我会用心倾听和陪伴你。
                    </div>
                </div>
            </div>

            <!-- 趣味释压坊 -->
            <div class="page relief-page">
                <div class="relief-tabs">
                    <button class="relief-tab active" onclick="switchRelief(0)">👊 虚拟沙袋</button>
                    <button class="relief-tab" onclick="switchRelief(1)">🎨 涂鸦画板</button>
                    <button class="relief-tab" onclick="switchRelief(2)">🎵 舒缓音乐</button>
                </div>

                <!-- 沙袋 -->
                <div class="relief-content active">
                    <p style="color: #666; margin-bottom: 20px;">用力击打释放负面情绪，每一击都是对压力的宣泄</p>
                    <div class="punching-bag" id="punchingBag" onclick="hitBag()">💪</div>
                    <div class="bag-count">已挥拳 <span id="hitCount">0</span> 次</div>
                </div>

                <!-- 涂鸦板 -->
                <div class="relief-content">
                    <p style="color: #666; margin-bottom: 15px;">自由涂鸦，让创意和情感在笔端流淌</p>
                    <div class="canvas-tools">
                        <button class="canvas-tool-btn active" onclick="setDrawMode('pen')">✏️ 画笔</button>
                        <button class="canvas-tool-btn" onclick="setDrawMode('eraser')">🗑️ 橡皮</button>
                        <input type="color" id="colorPicker" class="color-picker" value="#ff9a76" onchange="setColor(this.value)">
                        <button class="canvas-tool-btn" onclick="clearCanvas()">🔄 清空画板</button>
                    </div>
                    <div class="canvas-container">
                        <canvas id="drawingCanvas" width="320" height="280"></canvas>
                    </div>
                </div>

                <!-- 音乐 -->
                <div class="relief-content">
                    <div class="music-display">
                        <div class="music-title" id="musicTitle">🎶 舒缓钢琴曲</div>
                        <div class="music-artist" id="musicArtist">无损音乐播放</div>
                    </div>
                    <div class="music-controls">
                        <button class="music-btn" onclick="previousTrack()">⏮️</button>
                        <button class="music-btn" id="playBtn" onclick="togglePlay()">▶️</button>
                        <button class="music-btn" onclick="nextTrack()">⏭️</button>
                    </div>
                    <div class="music-list" id="musicList"></div>
                </div>
            </div>

            <!-- 心绪答疑册 -->
            <div class="page faq-page">
                <div class="faq-categories">
                    <button class="category-btn active" onclick="switchCategory('emotion')">情绪管理</button>
                    <button class="category-btn" onclick="switchCategory('sleep')">睡眠调理</button>
                    <button class="category-btn" onclick="switchCategory('work')">工作压力</button>
                    <button class="category-btn" onclick="switchCategory('relationship')">人际关系</button>
                </div>

                <div id="faqContent"></div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigateTo(0)">
                <div class="icon">🏠</div>
                <div class="label">首页</div>
            </div>
            <div class="nav-item" onclick="navigateTo(1)">
                <div class="icon">💬</div>
                <div class="label">心声屋</div>
            </div>
            <div class="nav-item" onclick="navigateTo(2)">
                <div class="icon">🎮</div>
                <div class="label">释压坊</div>
            </div>
            <div class="nav-item" onclick="navigateTo(3)">
                <div class="icon">📚</div>
                <div class="label">答疑册</div>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局变量 ==========
        let currentPage = 0;
        let isListening = false;
        let hitCount = 0;
        let currentMusicTrack = 0;
        let isPlaying = false;
        let drawMode = 'pen';
        let drawColor = '#ff9a76';
        let selectedEmotion = null;
        const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;

        // 音乐库
        const musicTracks = [
            { title: '🎹 舒缓钢琴曲', artist: '李闰珉 - 梦的绽放' },
            { title: '🌊 海浪冥想音乐', artist: '自然音效混音' },
            { title: '🌙 月夜小提琴', artist: '古典音乐精选' },
            { title: '🍃 雨林环境音', artist: '自然疗愈系列' },
            { title: '🎼 瑜伽放松音乐', artist: '冥想音乐大师' }
        ];

        // FAQ数据
        const faqData = {
            emotion: [
                {
                    q: '如何快速缓解焦虑情绪？',
                    a: '尝试腹式呼吸法：深吸气4秒，屏住4秒，呼气4秒。重复5-10次。同时可以进行运动、听音乐、倾诉等方式转移注意力。'
                },
                {
                    q: '为什么我总是感到沮丧？',
                    a: '长期沮丧可能与压力积累、睡眠不足、缺乏运动或社交隔离有关。建议建立规律作息、增加户外活动、主动社交。必要时咨询专业心理咨询师。'
                },
                {
                    q: '如何接纳自己的负面情绪？',
                    a: '负面情绪是正常的。允许自己感受它，而不是压抑。写日记、倾诉、运动都能帮助处理情绪。重点是不让短期情绪影响长期决策。'
                }
            ],
            sleep: [
                {
                    q: '失眠怎么办？',
                    a: '养成固定作息，睡前1小时避免手机。可尝试冥想、瑜伽、舒缓音乐。卧室保持黑暗、安静、凉爽。必要时寻求医学帮助。'
                },
                {
                    q: '如何改善睡眠质量？',
                    a: '规律运动（但避免睡前3小时），限制咖啡因，减少屏幕时间，建立睡前仪式，适当日光照射能帮助调整生物钟。'
                }
            ],
            work: [
                {
                    q: '工作压力太大怎么办？',
                    a: '优先级管理：列出任务按重要性排序。设定边界：明确工作时间，下班后关闭工作消息。定期休息，运动，和同事倾诉。必要时与上级沟通工作量。'
                },
                {
                    q: '如何避免职业倦怠？',
                    a: '定期休假充电，培养工作外的兴趣爱好，参加社交活动。在工作中寻找意义感和成就感，不断学习新技能提升自信。'
                }
            ],
            relationship: [
                {
                    q: '如何改善人际关系？',
                    a: '学会倾听，表达同理心。定期和朋友聊天，主动示好。设定健康边界，远离有毒人际关系。培养自信，参加兴趣小组认识志同道合的人。'
                },
                {
                    q: '一个人感到孤独怎么办？',
                    a: '孤独感很常见。可加入兴趣社团，主动参与社团活动，开展志愿服务。同时学会自我陪伴，培养自己喜欢的爱好。如持续困扰，寻求心理帮助。'
                }
            ]
        };

        // ========== 页面导航 ==========
        function navigateTo(pageIndex) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.querySelectorAll('.page')[pageIndex].classList.add('active');
            document.querySelectorAll('.nav-item')[pageIndex].classList.add('active');

            currentPage = pageIndex;

            if (pageIndex === 2) {
                initCanvas();
            }
            if (pageIndex === 3) {
                switchCategory('emotion');
            }
        }

        // ========== 情绪选择 ==========
        function selectEmotion(emotion) {
            selectedEmotion = emotion;
            document.querySelectorAll('.emotion-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // ========== 语音输入 ==========
        function startVoiceInput() {
            if (!recognition) {
                alert('您的浏览器不支持语音识别功能，建议使用Chrome、Edge等现代浏览器。\n\n已为您模拟语音输入演示。');
                simulateVoiceInput();
                return;
            }

            if (isListening) {
                recognition.stop();
                return;
            }

            isListening = true;
            const btn = document.getElementById('voiceBtn');
            btn.classList.add('listening');
            btn.textContent = '🎤 正在倾听...';

            const transcript = document.getElementById('transcript');
            transcript.textContent = '正在识别语音中...';

            recognition.lang = 'zh-CN';
            recognition.onstart = () => {
                transcript.textContent = '👂 我在认真倾听你的心声...';
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    finalTranscript += event.results[i][0].transcript;
                }
                transcript.textContent = finalTranscript || '说话被中断，请重试。';
                generateAIResponse(finalTranscript);
            };

            recognition.onerror = (event) => {
                transcript.textContent = '❌ 识别失败：' + event.error + '\n\n已模拟演示回复。';
                simulateVoiceInput();
            };

            recognition.onend = () => {
                isListening = false;
                btn.classList.remove('listening');
                btn.textContent = '🎤 点击开始语音输入';
            };

            recognition.start();
        }

        function simulateVoiceInput() {
            const simulated = ['我最近工作压力很大，感觉很疲惫', '我在人际关系上遇到了困扰', '我晚上睡眠质量不好', '我总是很焦虑，不知道该怎么办'];
            const text = simulated[Math.floor(Math.random() * simulated.length)];
            document.getElementById('transcript').textContent = text;
            generateAIResponse(text);
        }

        function generateAIResponse(userInput) {

                        '✨ 沮丧的感受是真实的，但它不会永远停留。就像天气会变化一样，你的心情也会逐渐晴朗。现在，给自己一些温柔，允许自己休息。',
                        '🌸 你能感受到自己的沮丧，这说明你很敏感、很有内心世界。这份敏感虽然有时会带来痛苦，但也让你更能体察他人的感受。'

                },

                },
                tired: {
                    replies: [

                },

                    ]
                },
                default: {
                    replies: [
                        '💚 谢谢你的分享。无论你经历了什么，我都愿意陪伴你。你的感受很重要，需要被好好对待。',
                        '🌸 每一份情绪都在向我们诉说什么。听听它想告诉我们，然后温和地调整。你做得很好。',
                        '✨ 你能够觉察到自己的情绪，这本身就是成长。继续这样倾听自己的心声，你会越来越了解自己。'

            aiResponseDiv.style.opacity = '0';

                aiResponseDiv.textContent = reply;

        // ========== 沙袋功能 ==========
        function hitBag() {
            hitCount++;
            document.getElementById('hitCount').textContent = hitCount;

            const bag = document.getElementById('punchingBag');
            bag.style.animation = 'none';
            setTimeout(() => {
                bag.style.animation = 'punch 0.3s ease-in-out';
            }, 10);

            createParticles();
        }

        function createParticles() {
            const bag = document.getElementById('punchingBag');
            for (let i = 0; i < 3; i++) {
                const particle = document.createElement('div');
                particle.textContent = '💥';
                particle.style.position = 'fixed';
                particle.style.left = bag.offsetLeft + bag.offsetWidth / 2 + 'px';
                particle.style.top = bag.offsetTop + bag.offsetHeight / 2 + 'px';
                particle.style.fontSize = '20px';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '999';
                document.body.appendChild(particle);

                const tx = (Math.random() - 0.5) * 100;
                const ty = Math.random() * -100 - 50;
                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 600, easing: 'ease-out' });

                setTimeout(() => particle.remove(), 600);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes punch {
                0%, 100% { transform: scaleY(1); }
                50% { transform: scaleY(0.85) scaleX(1.1); }
            }
        `;
        document.head.appendChild(style);

        // ========== 绘画功能 ==========
        let canvas, ctx, isDrawing = false;

        function initCanvas() {
            if (canvas) return;
            canvas = document.getElementById('drawingCanvas');
            ctx = canvas.getContext('2d');

            // 设置 DPI 缩放
            const dpr = window.devicePixelRatio || 1;
            canvas.width = 320 * dpr;
            canvas.height = 280 * dpr;
            canvas.style.width = '320px';
            canvas.style.height = '280px';
            ctx.scale(dpr, dpr);

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, 320, 280);

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // 手触事件
            canvas.addEventListener('touchstart', handleTouch);
            canvas.addEventListener('touchmove', handleTouch);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (drawMode === 'pen') {
                ctx.beginPath();
                ctx.moveTo(x, y);
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (drawMode === 'pen') {
                ctx.lineTo(x, y);
                ctx.strokeStyle = drawColor;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            } else if (drawMode === 'eraser') {
                ctx.clearRect(x - 10, y - 10, 20, 20);
            }
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent(e.type === 'touchstart' ? 'mousedown' : 'mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }

        function stopDrawing() {
            isDrawing = false;
            if (ctx) ctx.closePath();
        }

        function setDrawMode(mode) {
            drawMode = mode;
            document.querySelectorAll('.canvas-tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setColor(color) {
            drawColor = color;
        }

        function clearCanvas() {
            if (ctx) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, 320, 280);
            }
        }

        // ========== 音乐功能 ==========
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');
            btn.textContent = isPlaying ? '⏸️' : '▶️';
        }

        function nextTrack() {
            currentMusicTrack = (currentMusicTrack + 1) % musicTracks.length;
            updateMusicDisplay();
        }

        function previousTrack() {
            currentMusicTrack = (currentMusicTrack - 1 + musicTracks.length) % musicTracks.length;
            updateMusicDisplay();
        }

        function updateMusicDisplay() {
            const track = musicTracks[currentMusicTrack];
            document.getElementById('musicTitle').textContent = track.title;
            document.getElementById('musicArtist').textContent = track.artist;

            const items = document.querySelectorAll('.music-item');
            items.forEach((item, idx) => {
                item.classList.toggle('playing', idx === currentMusicTrack);
            });
        }

        function initMusicList() {
            const musicList = document.getElementById('musicList');
            musicList.innerHTML = musicTracks.map((track, idx) => 
                `<div class="music-item ${idx === 0 ? 'playing' : ''}" onclick="selectMusic(${idx})">${track.title}</div>`
            ).join('');
        }

        function selectMusic(idx) {
            currentMusicTrack = idx;
            updateMusicDisplay();
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸️';
        }

        // ========== FAQ功能 ==========
        function switchCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const faqContent = document.getElementById('faqContent');
            const items = faqData[category] || [];

            faqContent.innerHTML = items.map((item, idx) => `
                <div class="faq-item">
                    <div class="faq-question" onclick="toggleFAQ(${idx})">
                        <span class="faq-question-text">${item.q}</span>
                        <span class="faq-toggle">▼</span>
                    </div>
                    <div class="faq-answer">${item.a}</div>
                </div>
            `).join('');
        }

        function toggleFAQ(idx) {
            const answers = document.querySelectorAll('.faq-answer');
            const toggles = document.querySelectorAll('.faq-toggle');
            
            // 关闭其他展开的FAQ
            answers.forEach((ans, i) => {
                if (i !== idx) {
                    ans.classList.remove('show');
                    toggles[i].textContent = '▼';
                }
            });

            // 切换当前FAQ
            answers[idx].classList.toggle('show');
            toggles[idx].textContent = answers[idx].classList.contains('show') ? '▲' : '▼';
        }

        function switchRelief(idx) {
            document.querySelectorAll('.relief-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.relief-content').forEach(content => content.classList.remove('active'));

            document.querySelectorAll('.relief-tab')[idx].classList.add('active');
            document.querySelectorAll('.relief-content')[idx].classList.add('active');
        }

        // 页面加载初始化
        window.addEventListener('load', () => {
            initMusicList();
        });

        // 防止双击放大
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        });
    </script>
